<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Medicare Essentials</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific overrides for the error page layout */
        .error-container {
            text-align: center;
            padding: 60px 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin: 40px auto;
            max-width: 600px;
        }
        .error-code {
            font-size: 6rem;
            font-weight: bold;
            color: #dc3545; /* Red alert color */
            line-height: 1;
            margin-bottom: 10px;
        }
        .error-message {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 20px;
        }
        .back-btn {
            display: inline-block;
            text-decoration: none;
            background-color: #0056b3;
            color: white;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .back-btn:hover {
            background-color: #004494;
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <header>
        <div class="container">
            <h1>Medicare Essentials</h1>
            <p>DevOps Project Deployment</p>
        </div>
    </header>

    <!-- Main Content Section -->
    <main class="container">
        <div class="error-container">
            <div class="error-code">404</div>
            <div class="error-message">Oops! The page you are looking for does not exist.</div>
            <p style="margin-bottom: 30px; color: #666;">It might have been moved, deleted, or you may have typed the URL incorrectly.</p>
            <a href="index.html" class="back-btn">Return to Homepage</a>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2026 Medicare Essentials Project. Academic DevOps Demo.</p>
        </div>
    </footer>

</body>
</html>
